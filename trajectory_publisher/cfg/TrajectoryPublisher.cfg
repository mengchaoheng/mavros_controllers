#!/usr/bin/env python
PACKAGE = "trajectory_publisher"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

traj_enum = gen.enum([
    gen.const("zero", int_t, 0, "Zero reference"),
    gen.const("circle", int_t, 1, "Legacy circle"),
    gen.const("lamniscate", int_t, 2, "Legacy lamniscate"),
    gen.const("stationary", int_t, 3, "Stationary reference"),
    gen.const("figure8_horizontal", int_t, 4, "Horizontal figure-eight"),
    gen.const("figure8_vertical", int_t, 5, "Vertical figure-eight"),
    gen.const("helix_flip", int_t, 6, "X-forward helix flip"),
    gen.const("helix_flip_y", int_t, 7, "Y-forward helix flip"),
    gen.const("flip_loop_sine", int_t, 8, "Sine flip loop"),
    gen.const("fast_circle", int_t, 9, "Fast circle"),
    gen.const("race_track_c", int_t, 10, "Sun-style Race Track C"),
], "Trajectory choices")

gen.add("trajName", int_t, 0, "trajName", 4, 0, 10, edit_method=traj_enum)
gen.add("omegaValue", double_t, 0, "Fixed angular frequency omega.value [rad/s], clamped by the active launch omega range", 1.0, 0.0, 10.0)
gen.add("figure8HorizontalAx", double_t, 0, "figure8_horizontal Ax [m]", 2.0, 0.1, 10.0)
gen.add("figure8HorizontalAy", double_t, 0, "figure8_horizontal Ay [m]", 2.0, 0.1, 10.0)
gen.add("figure8HorizontalHc", double_t, 0, "figure8_horizontal Hc [m]", 3.0, 0.5, 10.0)
gen.add("figure8HorizontalTheta0", double_t, 0, "figure8_horizontal theta0 [rad]", 0.0, -3.141592653589793, 3.141592653589793)
gen.add("figure8VerticalAy", double_t, 0, "figure8_vertical Ay [m]", 2.0, 0.1, 10.0)
gen.add("figure8VerticalAz", double_t, 0, "figure8_vertical Az [m]", 2.0, 0.1, 10.0)
gen.add("figure8VerticalHc", double_t, 0, "figure8_vertical Hc [m]", 3.0, 0.5, 10.0)
gen.add("figure8VerticalTheta0", double_t, 0, "figure8_vertical theta0 [rad]", -0.7853981633974483, -3.141592653589793, 3.141592653589793)
gen.add("helixFlipAy", double_t, 0, "helix_flip Ay [m]", 2.0, 0.1, 10.0)
gen.add("helixFlipAz", double_t, 0, "helix_flip Az [m]", 2.0, 0.1, 10.0)
gen.add("helixFlipHc", double_t, 0, "helix_flip Hc [m]", 3.0, 0.5, 10.0)
gen.add("helixFlipVx", double_t, 0, "helix_flip Vx [m/s]", 0.3, -5.0, 5.0)
gen.add("helixFlipTheta0", double_t, 0, "helix_flip theta0 [rad]", 0.0, -3.141592653589793, 3.141592653589793)
gen.add("helixFlipYAx", double_t, 0, "helix_flip_y Ax [m]", 2.0, 0.1, 10.0)
gen.add("helixFlipYAz", double_t, 0, "helix_flip_y Az [m]", 2.0, 0.1, 10.0)
gen.add("helixFlipYHc", double_t, 0, "helix_flip_y Hc [m]", 3.0, 0.5, 10.0)
gen.add("helixFlipYVy", double_t, 0, "helix_flip_y Vy [m/s]", 0.3, -5.0, 5.0)
gen.add("helixFlipYTheta0", double_t, 0, "helix_flip_y theta0 [rad]", 0.0, -3.141592653589793, 3.141592653589793)
gen.add("flipLoopSineAy", double_t, 0, "flip_loop_sine Ay [m]", 2.0, 0.1, 10.0)
gen.add("flipLoopSineAz", double_t, 0, "flip_loop_sine Az [m]", 2.0, 0.1, 10.0)
gen.add("flipLoopSineHc", double_t, 0, "flip_loop_sine Hc [m]", 3.0, 0.5, 10.0)
gen.add("flipLoopSineVx", double_t, 0, "flip_loop_sine Vx [m/s]", 0.0, -5.0, 5.0)
gen.add("flipLoopSineTheta0", double_t, 0, "flip_loop_sine theta0 [rad]", 0.0, -3.141592653589793, 3.141592653589793)
gen.add("fastCircleAx", double_t, 0, "fast_circle Ax [m]", 3.0, 0.1, 10.0)
gen.add("fastCircleAy", double_t, 0, "fast_circle Ay [m]", 3.0, 0.1, 10.0)
gen.add("fastCircleHc", double_t, 0, "fast_circle Hc [m]", 3.0, 0.5, 10.0)
gen.add("fastCircleTheta0", double_t, 0, "fast_circle theta0 [rad]", 0.0, -3.141592653589793, 3.141592653589793)
gen.add("trajectoryStartRampDuration", double_t, 0, "Smooth ramp after takeoff", 2.0, 0.0, 10.0)
gen.add("waitStartBeforeTrajectory", bool_t, 0, "Hold the trajectory start point until the vehicle reaches it", True)
gen.add("startPositionTolerance", double_t, 0, "Position tolerance for starting a trajectory", 0.25, 0.02, 2.0)
gen.add("startVelocityTolerance", double_t, 0, "Velocity tolerance for starting a trajectory", 0.5, 0.02, 3.0)
gen.add("startHoldDuration", double_t, 0, "Hover time at the trajectory start point before tracking", 3.0, 0.0, 20.0)

exit(gen.generate(PACKAGE, "trajectory_publisher", "TrajectoryPublisher"))
