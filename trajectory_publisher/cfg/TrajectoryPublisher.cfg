#!/usr/bin/env python
PACKAGE = "trajectory_publisher"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

traj_enum = gen.enum([
    gen.const("zero", int_t, 0, "Zero reference"),
    gen.const("circle", int_t, 1, "Legacy circle"),
    gen.const("lamniscate", int_t, 2, "Legacy lamniscate"),
    gen.const("stationary", int_t, 3, "Stationary reference"),
    gen.const("figure8_horizontal", int_t, 4, "Horizontal figure-eight"),
    gen.const("figure8_vertical", int_t, 5, "Vertical figure-eight"),
    gen.const("helix_flip", int_t, 6, "X-forward helix flip"),
    gen.const("helix_flip_y", int_t, 7, "Y-forward helix flip"),
    gen.const("flip_loop_sine", int_t, 8, "Sine flip loop"),
    gen.const("fast_circle", int_t, 9, "Fast circle"),
    gen.const("race_track_c", int_t, 10, "Sun-style Race Track C"),
], "Trajectory choices")

gen.add("trajName", int_t, 0, "trajName", 1, 0, 10, edit_method=traj_enum)
gen.add("trajIntensity", double_t, 0, "0 gentle, 1 aggressive", 0.75, 0.0, 1.0)
gen.add("Tend", double_t, 0, "Base period/duration used by benchmark trajectories", 10.0, 1.0, 60.0)
gen.add("helixTurns", double_t, 0, "Turns for helix/flip trajectories", 5.0, 0.25, 12.0)
gen.add("raceTrackMaxSpeed", double_t, 0, "Race Track C speed target", 19.4, 0.5, 30.0)
gen.add("trajectorySpeed", double_t, 0, "Fixed physical speed for continuous shape trajectories", 0.3, 0.05, 10.0)
gen.add("shapeOmega", double_t, 0, "Legacy circle/lamniscate angular rate", 0.2, 0.05, 5.0)
gen.add("trajectoryStartRampDuration", double_t, 0, "Smooth ramp after takeoff", 2.0, 0.0, 10.0)
gen.add("waitStartBeforeTrajectory", bool_t, 0, "Hold the trajectory start point until the vehicle reaches it", True)
gen.add("startPositionTolerance", double_t, 0, "Position tolerance for starting a trajectory", 0.25, 0.02, 2.0)
gen.add("startVelocityTolerance", double_t, 0, "Velocity tolerance for starting a trajectory", 0.5, 0.02, 3.0)
gen.add("startHoldDuration", double_t, 0, "Hover time at the trajectory start point before tracking", 3.0, 0.0, 20.0)

exit(gen.generate(PACKAGE, "trajectory_publisher", "TrajectoryPublisher"))
